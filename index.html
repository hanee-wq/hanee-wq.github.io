<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>복슬이</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Gaegu:wght@300;400&display=swap');

  :root {
    --bg: #1a1528;
    --bg2: #221d35;
    --card: rgba(255,255,255,0.04);
    --text: #e8e0f0;
    --text-dim: #9a8fb0;
    --accent: #c9a7e8;
    --warm: #f7c6d4;
    --glow: rgba(201,167,232,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Nanum Myeongjo', serif;
    color: var(--text);
  }

  #noise {
    position: fixed; inset: 0; pointer-events: none; z-index: 999;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px 128px;
    animation: noiseAnim 0.08s steps(1) infinite;
  }
  @keyframes noiseAnim {
    0%{background-position:0 0} 10%{background-position:-5px -10px}
    20%{background-position:-15px 5px} 30%{background-position:7px -25px}
    40%{background-position:-5px 25px} 50%{background-position:-15px 10px}
    60%{background-position:15px 0px} 70%{background-position:0px 15px}
    80%{background-position:3px 35px} 90%{background-position:-10px 10px}
    100%{background-position:0px 0px}
  }

  #scanlines {
    position: fixed; inset: 0; pointer-events: none; z-index: 998;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
  }

  #app {
    width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative;
    transition: background 3s ease;
  }

  /* ── TITLE SCREEN ── */
  #title-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 24px; text-align: center; padding: 32px;
    animation: fadeIn 1.5s ease forwards;
  }
  .title-creature { margin-bottom: 8px; }
  .title-name {
    font-family: 'Gaegu', cursive;
    font-size: clamp(48px, 12vw, 80px);
    color: #fff;
    text-shadow: 0 0 40px var(--glow), 0 0 80px rgba(201,167,232,0.2);
    letter-spacing: 8px;
  }
  .title-sub {
    font-size: 13px; color: var(--text-dim);
    letter-spacing: 3px; text-transform: uppercase;
    font-family: 'Gaegu', cursive;
  }
  .start-btn {
    margin-top: 16px;
    background: none; border: 1px solid rgba(201,167,232,0.3);
    color: var(--accent); padding: 12px 40px;
    font-family: 'Gaegu', cursive; font-size: 18px;
    letter-spacing: 4px; cursor: pointer;
    border-radius: 40px;
    transition: all 0.3s;
    animation: pulse 2s ease-in-out infinite;
  }
  .start-btn:hover {
    background: rgba(201,167,232,0.1);
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--glow);
  }
  @keyframes pulse {
    0%,100%{opacity:0.7} 50%{opacity:1}
  }

  /* ── GAME SCREEN ── */
  #game-screen {
    display: none; flex-direction: column; align-items: center; justify-content: space-between;
    width: 100%; height: 100%;
    padding: 24px 20px 32px;
    max-width: 420px; margin: 0 auto;
  }

  /* Top */
  .top-bar {
    width: 100%; display: flex; justify-content: space-between; align-items: center;
    padding: 0 4px;
  }
  .day-display {
    font-family: 'Gaegu', cursive;
    font-size: 13px; letter-spacing: 4px; color: var(--text-dim);
    text-transform: uppercase;
  }
  .day-num {
    font-family: 'Gaegu', cursive;
    font-size: 22px; font-weight: 700; color: var(--accent);
  }
  .dots {
    display: flex; gap: 6px; align-items: center;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(255,255,255,0.12);
    transition: background 0.5s;
  }
  .dot.filled { background: var(--accent); box-shadow: 0 0 6px var(--glow); }

  /* Stage */
  .stage {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 100%; position: relative;
    gap: 16px;
  }

  /* Background glow */
  .bg-glow {
    position: absolute; width: 260px; height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,167,232,0.08) 0%, transparent 70%);
    pointer-events: none;
    transition: background 3s ease;
    animation: glowPulse 4s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%,100%{transform:scale(1);opacity:0.8} 50%{transform:scale(1.05);opacity:1}
  }

  /* Boksuli SVG container */
  #boksuli-wrap {
    position: relative; z-index: 2;
    transition: filter 2s ease;
  }
  #boksuli-svg {
    width: 160px; height: 160px;
    filter: drop-shadow(0 8px 24px rgba(201,167,232,0.3));
    transition: filter 2s ease;
  }

  /* Event box */
  .event-box {
    width: 100%; max-width: 340px;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 18px 20px;
    text-align: center;
    backdrop-filter: blur(4px);
    min-height: 80px;
    display: flex; align-items: center; justify-content: center;
  }
  .event-text {
    font-size: 14px; line-height: 1.8;
    color: var(--text); letter-spacing: 0.5px;
    transition: opacity 0.4s;
  }
  .reaction-text {
    font-size: 12px; color: var(--text-dim);
    font-style: italic; letter-spacing: 1px;
  }

  /* Choices */
  .choices {
    width: 100%; display: flex; flex-direction: column; gap: 10px;
  }
  .choice-btn {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text); padding: 13px 20px;
    font-family: 'Nanum Myeongjo', serif;
    font-size: 13px; letter-spacing: 0.5px;
    text-align: center; cursor: pointer;
    border-radius: 12px;
    transition: all 0.25s;
    backdrop-filter: blur(4px);
    line-height: 1.5;
  }
  .choice-btn:hover, .choice-btn:active {
    background: rgba(201,167,232,0.1);
    border-color: rgba(201,167,232,0.3);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .choice-btn:disabled {
    opacity: 0.4; cursor: default; transform: none;
  }

  /* ── ENDING SCREEN ── */
  #ending-screen {
    display: none; flex-direction: column; align-items: center; justify-content: center;
    gap: 20px; text-align: center; padding: 32px;
    width: 100%; height: 100%;
    animation: fadeIn 2s ease forwards;
  }
  .ending-title {
    font-family: 'Gaegu', cursive;
    font-size: clamp(28px, 8vw, 48px);
    letter-spacing: 6px;
    text-shadow: 0 0 30px currentColor;
  }
  .ending-body {
    max-width: 300px;
    font-size: 13px; line-height: 2;
    color: var(--text-dim); letter-spacing: 1px;
  }
  .ending-creature { margin: 8px 0; }
  .replay-btn {
    margin-top: 8px;
    background: none; border: 1px solid rgba(255,255,255,0.15);
    color: var(--text-dim); padding: 10px 32px;
    font-family: 'Gaegu', cursive; font-size: 15px;
    letter-spacing: 3px; cursor: pointer; border-radius: 40px;
    transition: all 0.3s;
  }
  .replay-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }

  /* Utilities */
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeOut { from{opacity:1} to{opacity:0} }
  .fade-in { animation: fadeIn 0.6s ease forwards; }
  .fade-out { animation: fadeOut 0.4s ease forwards; }

  /* Boksuli animations */
  @keyframes breathe { 0%,100%{transform:scaleY(1) scaleX(1)} 50%{transform:scaleY(0.97) scaleX(1.02)} }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 40%{transform:translateY(-12px)} 60%{transform:translateY(-8px)} }
  @keyframes wobble { 0%,100%{transform:rotate(0deg)} 25%{transform:rotate(-3deg)} 75%{transform:rotate(3deg)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-4px)} 40%,80%{transform:translateX(4px)} }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  @keyframes doze { 0%,100%{transform:rotate(0deg) translateY(0)} 50%{transform:rotate(5deg) translateY(3px)} }
  @keyframes glitch {
    0%,95%,100%{transform:translate(0)} 96%{transform:translate(-3px,1px)} 97%{transform:translate(3px,-1px)} 98%{transform:translate(-2px,2px)}
  }

  .anim-breathe { animation: breathe 3s ease-in-out infinite; }
  .anim-bounce  { animation: bounce 0.5s ease; }
  .anim-wobble  { animation: wobble 0.4s ease; }
  .anim-shake   { animation: shake 0.4s ease; }
  .anim-float   { animation: float 2s ease-in-out infinite; }
  .anim-doze    { animation: doze 2s ease-in-out infinite; }
  .anim-glitch  { animation: glitch 3s ease infinite; }

  /* Particle */
  .particles { position: absolute; pointer-events: none; z-index: 3; }
  .particle {
    position: absolute; width: 6px; height: 6px;
    border-radius: 50%; opacity: 0;
    animation: particleAnim 1.2s ease forwards;
  }
  @keyframes particleAnim {
    0%{opacity:1;transform:translate(0,0) scale(1)}
    100%{opacity:0;transform:var(--tx) scale(0)}
  }

  /* Star sparkle */
  .sparkle {
    position: absolute; font-size: 14px; pointer-events: none;
    animation: sparkleAnim 1s ease forwards;
  }
  @keyframes sparkleAnim {
    0%{opacity:1;transform:translateY(0) scale(1)}
    100%{opacity:0;transform:translateY(-30px) scale(0.5)}
  }

  /* Shadow (bad) */
  .shadow-overlay {
    position: absolute; bottom: -10px;
    width: 100px; height: 30px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.4) 0%, transparent 70%);
    border-radius: 50%;
    opacity: 0; transition: opacity 2s ease;
    pointer-events: none; z-index: 1;
  }

  /* Floating text */
  .float-text {
    position: absolute; pointer-events: none; z-index: 10;
    font-family: 'Gaegu', cursive; font-size: 16px;
    color: var(--accent);
    animation: floatTextAnim 1.5s ease forwards;
    top: -10px;
  }
  @keyframes floatTextAnim {
    0%{opacity:1;transform:translateY(0)}
    100%{opacity:0;transform:translateY(-40px)}
  }
</style>
</head>
<body>
<div id="noise"></div>
<div id="scanlines"></div>

<div id="app">

  <!-- TITLE -->
  <div id="title-screen">
    <div class="title-creature">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <ellipse cx="50" cy="56" rx="32" ry="30" fill="white" opacity="0.97"/>
        <ellipse cx="50" cy="52" rx="28" ry="26" fill="white"/>
        <circle cx="42" cy="50" r="5" fill="#1a1528"/>
        <circle cx="58" cy="50" r="5" fill="#1a1528"/>
        <circle cx="43.5" cy="48.5" r="1.5" fill="white"/>
        <circle cx="59.5" cy="48.5" r="1.5" fill="white"/>
        <ellipse cx="50" cy="60" rx="2" ry="1" fill="#e8c0cc" opacity="0.7"/>
        <ellipse cx="35" cy="72" rx="7" ry="4" fill="white" opacity="0.9"/>
        <ellipse cx="65" cy="72" rx="7" ry="4" fill="white" opacity="0.9"/>
        <ellipse cx="50" cy="80" rx="12" ry="5" fill="white" opacity="0.85"/>
      </svg>
    </div>
    <div class="title-name">복슬이</div>
    <div class="title-sub">하얀 털뭉치의 10일</div>
    <button class="start-btn" onclick="startGame()">▷ 시작하기</button>
  </div>

  <!-- GAME -->
  <div id="game-screen">
    <div class="top-bar">
      <div>
        <div class="day-display">Day</div>
        <div class="day-num" id="day-num">1</div>
      </div>
      <div class="dots" id="dots"></div>
    </div>

    <div class="stage">
      <div class="bg-glow" id="bg-glow"></div>
      <div class="shadow-overlay" id="shadow-el"></div>
      <div id="boksuli-wrap" class="anim-breathe">
        <svg id="boksuli-svg" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
          <!-- Drawn dynamically -->
        </svg>
      </div>
      <div class="event-box">
        <div class="event-text" id="event-text"></div>
      </div>
    </div>

    <div class="choices" id="choices"></div>
  </div>

  <!-- ENDING -->
  <div id="ending-screen">
    <div class="ending-creature" id="ending-creature"></div>
    <div class="ending-title" id="ending-title"></div>
    <div class="ending-body" id="ending-body"></div>
    <button class="replay-btn" onclick="replayGame()">처음으로 돌아가기</button>
  </div>

</div>

<script>
// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let day = 1;
let score = 0; // hidden: + = angel direction, - = monster direction
let gameStarted = false;

// ══════════════════════════════════════════════
//  GAME DATA  (10 days × event + 3 choices)
// ══════════════════════════════════════════════
const events = [
  // DAY 1
  {
    text: "복슬이가 처음으로 눈을 뜬다.\n아직 세상이 낯선 것 같다.",
    choices: [
      { text: "이름을 불러줬다", delta: +1, reaction: "귀를 쫑긋 세우는 것 같다... 귀가 없는데도.", anim: "bounce" },
      { text: "그냥 바라봤다", delta: 0, reaction: "복슬이도 그냥 바라본다.", anim: "breathe" },
      { text: "간식을 줬다", delta: -1, reaction: "맛있는지, 두 번 씹는다.", anim: "wobble" },
    ]
  },
  // DAY 2
  {
    text: "복슬이가 창가에 앉아\n바깥을 하염없이 바라보고 있다.",
    choices: [
      { text: "같이 창밖을 봤다", delta: +1, reaction: "어깨가 살짝 편안해진 것 같다.", anim: "float" },
      { text: "커튼을 쳤다", delta: -1, reaction: "복슬이가 잠시 멈춘다.", anim: "shake" },
      { text: "불러서 데려왔다", delta: 0, reaction: "반응이 조금 느리다.", anim: "wobble" },
    ]
  },
  // DAY 3
  {
    text: "밤에 이상한 소리가 들렸다.\n복슬이가 먼저 일어났다.",
    choices: [
      { text: "복슬이 옆에 앉았다", delta: +1, reaction: "긴장이 조금 풀리는 것 같다.", anim: "bounce" },
      { text: "불을 켰다", delta: -1, reaction: "눈을 가늘게 뜬다.", anim: "shake" },
      { text: "먼저 자려고 했다", delta: 0, reaction: "혼자 오래 앉아 있었다.", anim: "doze" },
    ]
  },
  // DAY 4
  {
    text: "복슬이가 오늘 식사를 거부한다.\n그냥 바닥만 보고 있다.",
    choices: [
      { text: "걱정돼서 약을 줬다", delta: -1, reaction: "복슬이가 천천히 삼킨다.", anim: "wobble" },
      { text: "혼자 있게 뒀다", delta: +1, reaction: "한참 뒤 조용히 혼자 먹었다.", anim: "float" },
      { text: "억지로 먹이려 했다", delta: -2, reaction: "몸이 작게 떤다.", anim: "shake" },
    ]
  },
  // DAY 5
  {
    text: "복슬이가 갑자기 웃는다.\n아무것도 없는 곳을 보면서.",
    choices: [
      { text: "같이 웃어줬다", delta: +1, reaction: "이번엔 나를 보고 웃는다.", anim: "bounce" },
      { text: "무시했다", delta: 0, reaction: "한참 후에 조용히 멈췄다.", anim: "breathe" },
      { text: "뭐가 보이냐고 물었다", delta: -1, reaction: "...아무 말도 하지 않는다.", anim: "wobble" },
    ]
  },
  // DAY 6
  {
    text: "복슬이가 내 목소리를 따라한다.\n정확하게. 너무 정확하게.",
    choices: [
      { text: "여러 말을 가르쳐줬다", delta: -2, reaction: "복슬이가 전부 따라한다.", anim: "glitch" },
      { text: "가만히 들었다", delta: 0, reaction: "잠시 후 조용해진다.", anim: "doze" },
      { text: "하지 말라고 했다", delta: +1, reaction: "멈춘다. 그리고 오래 바라본다.", anim: "wobble" },
    ]
  },
  // DAY 7
  {
    text: "복슬이가 어두운 구석을\n좋아하기 시작했다.",
    choices: [
      { text: "밝은 곳으로 데려왔다", delta: +1, reaction: "잠시 눈을 감는다.", anim: "float" },
      { text: "원하는 대로 뒀다", delta: -1, reaction: "더 깊이 들어간다.", anim: "shake" },
      { text: "같이 어두운 곳에 앉았다", delta: 0, reaction: "조용히 기대는 것 같다.", anim: "breathe" },
    ]
  },
  // DAY 8
  {
    text: "복슬이가 오늘 혼잣말을 했다.\n알아들을 수 없는 말이었다.",
    choices: [
      { text: "다가가서 안아줬다", delta: +2, reaction: "잠시 후 혼잣말이 멈췄다.", anim: "bounce" },
      { text: "몰래 녹음했다", delta: -2, reaction: "복슬이가 갑자기 돌아본다.", anim: "glitch" },
      { text: "못 들은 척했다", delta: -1, reaction: "더 오래 중얼거린다.", anim: "doze" },
    ]
  },
  // DAY 9
  {
    text: "복슬이의 눈이 오늘따라\n유독 크게 느껴진다.",
    choices: [
      { text: "눈 마주치고 웃어줬다", delta: +1, reaction: "눈이 살짝 좁아진다.", anim: "float" },
      { text: "불편해서 피했다", delta: -2, reaction: "복슬이가 계속 쫓아온다.", anim: "wobble" },
      { text: "특별한 간식을 줬다", delta: -1, reaction: "먹지 않고 들고만 있다.", anim: "shake" },
    ]
  },
  // DAY 10
  {
    text: "마지막 날이다.\n복슬이가 오늘따라 조용하다.",
    choices: [
      { text: "오래 안아줬다", delta: +2, reaction: "복슬이가 눈을 감는다.", anim: "bounce" },
      { text: "자유롭게 놔뒀다", delta: +1, reaction: "혼자 창가에 앉아 해를 본다.", anim: "float" },
      { text: "말을 많이 걸었다", delta: -1, reaction: "...복슬이의 눈이 멀리 있다.", anim: "doze" },
    ]
  },
];

// ══════════════════════════════════════════════
//  DRAW BOKSULI
// ══════════════════════════════════════════════
function drawBoksuli(score) {
  const svg = document.getElementById('boksuli-svg');
  const bad = score < -4;
  const vbad = score < -8;
  const good = score > 4;
  const vgood = score > 8;
  const mid = day / 10;

  // Layout constants — eyes at 78, mouth clearly below at 92
  const EYE_Y    = bad ? 75 : 78;
  const MOUTH_Y  = bad ? 91 : 92;   // always below eyes

  const bodyColor = good ? '#fff9ff' : bad ? '#d8d0e8' : '#ffffff';
  const eyeColor  = vbad ? '#2a0a2a' : '#1a1528';
  const eyeSize   = bad ? Math.min(7 + Math.abs(score) * 0.4, 10) : 5.5;
  const mouthWidth= bad ? Math.min(4 + Math.abs(score) * 0.5, 9) : 3;

  let html = ``;

  // ── Outer halo / glow rings (good) ──
  if (vgood) {
    html += `<ellipse cx="80" cy="78" rx="52" ry="50" fill="none" stroke="rgba(220,180,255,0.12)" stroke-width="10"/>`;
    html += `<ellipse cx="80" cy="78" rx="44" ry="42" fill="none" stroke="rgba(255,220,255,0.10)" stroke-width="6"/>`;
  }
  if (good) {
    html += `<ellipse cx="80" cy="78" rx="42" ry="40" fill="rgba(240,220,255,0.06)"/>`;
  }

  // ── Halo ring above head (good) ──
  if (good) {
    const haloOp = Math.min((score - 4) * 0.025, 0.55);
    html += `<ellipse cx="80" cy="42" rx="20" ry="6" fill="none" stroke="rgba(255,240,200,${haloOp})" stroke-width="2.5"/>`;
  }

  // ── Shadow (bad) ──
  if (bad) {
    const shadowOp = Math.min(0.08 + Math.abs(score) * 0.02, 0.25);
    html += `<ellipse cx="80" cy="122" rx="30" ry="9" fill="rgba(0,0,0,${shadowOp})"/>`;
  }

  // ── Extra creepy eye (vbad) ──
  if (vbad) {
    html += `<circle cx="80" cy="48" r="3.5" fill="${eyeColor}" opacity="0.45"/>`;
    html += `<circle cx="81" cy="47" r="0.9" fill="white" opacity="0.2"/>`;
  }

  // ── Body blob ──
  html += `
    <ellipse cx="80" cy="90" rx="38" ry="32" fill="${bodyColor}" opacity="0.95"/>
    <ellipse cx="80" cy="84" rx="34" ry="29" fill="${bodyColor}"/>
  `;

  // ── Fur fluff highlights (good) ──
  if (good) {
    const fluffOp = Math.min((score - 4) * 0.018, 0.18);
    html += `<ellipse cx="58" cy="68" rx="8" ry="7" fill="${bodyColor}" opacity="${fluffOp + 0.5}"/>`;
    html += `<ellipse cx="102" cy="68" rx="8" ry="7" fill="${bodyColor}" opacity="${fluffOp + 0.5}"/>`;
    html += `<ellipse cx="80" cy="60" rx="10" ry="8" fill="${bodyColor}" opacity="${fluffOp + 0.45}"/>`;
  }

  // ── Inner body shine (good) ──
  if (good) {
    const shineOp = Math.min((score - 4) * 0.012, 0.14);
    html += `<ellipse cx="80" cy="76" rx="18" ry="16" fill="rgba(255,255,255,${shineOp})"/>`;
  }

  // ── Dark patches (bad) ──
  if (bad && mid > 0.5) {
    const patchOp = Math.min((Math.abs(score) - 4) * 0.04, 0.18);
    html += `<ellipse cx="68" cy="87" rx="9" ry="7" fill="rgba(60,20,80,${patchOp})"/>`;
    if (vbad) html += `<ellipse cx="93" cy="92" rx="7" ry="6" fill="rgba(60,20,80,${patchOp * 0.8})"/>`;
  }

  // ── Wings (vgood) ──
  if (vgood) {
    html += `
      <ellipse cx="44" cy="80" rx="16" ry="9" fill="rgba(230,210,255,0.40)" transform="rotate(-28 44 80)"/>
      <ellipse cx="116" cy="80" rx="16" ry="9" fill="rgba(230,210,255,0.40)" transform="rotate(28 116 80)"/>
    `;
  }

  // ── Arms ──
  html += `
    <ellipse cx="48" cy="99" rx="9" ry="6" fill="${bodyColor}" opacity="0.9" transform="rotate(-20 48 99)"/>
    <ellipse cx="112" cy="99" rx="9" ry="6" fill="${bodyColor}" opacity="0.9" transform="rotate(20 112 99)"/>
  `;

  // ── Feet ──
  html += `
    <ellipse cx="66" cy="118" rx="10" ry="6" fill="${bodyColor}" opacity="0.88"/>
    <ellipse cx="94" cy="118" rx="10" ry="6" fill="${bodyColor}" opacity="0.88"/>
  `;

  // ── Eyes ──
  html += `<circle cx="70" cy="${EYE_Y}" r="${eyeSize}" fill="${eyeColor}"/>`;
  html += `<circle cx="90" cy="${EYE_Y}" r="${eyeSize}" fill="${eyeColor}"/>`;

  // ── Eye shine ──
  if (!vbad) {
    const shineR = good ? 2.4 : 1.8;
    html += `<circle cx="${71.5}" cy="${EYE_Y - 1.5}" r="${shineR}" fill="white"/>`;
    html += `<circle cx="${91.5}" cy="${EYE_Y - 1.5}" r="${shineR}" fill="white"/>`;
    // extra sparkle dot (good)
    if (good) {
      html += `<circle cx="74" cy="${EYE_Y + 1.5}" r="1" fill="rgba(255,255,255,0.5)"/>`;
      html += `<circle cx="94" cy="${EYE_Y + 1.5}" r="1" fill="rgba(255,255,255,0.5)"/>`;
    }
  } else {
    html += `<circle cx="71" cy="${EYE_Y - 1}" r="0.8" fill="rgba(255,255,255,0.2)"/>`;
    html += `<circle cx="91" cy="${EYE_Y - 1}" r="0.8" fill="rgba(255,255,255,0.2)"/>`;
  }

  // ── Mouth (always below eyes) ──
  if (bad) {
    const mw = mouthWidth;
    // unsettling curved mouth — curves downward (sad/strange)
    html += `<path d="M${80-mw} ${MOUTH_Y-1} Q80 ${MOUTH_Y + mw * 1.3} ${80+mw} ${MOUTH_Y-1}" fill="none" stroke="${eyeColor}" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>`;
  } else {
    // small happy mouth or neutral
    const smileOp = good ? 0.9 : 0.55;
    if (good) {
      // tiny upward arc smile
      html += `<path d="M${80-mouthWidth} ${MOUTH_Y} Q80 ${MOUTH_Y + 3} ${80+mouthWidth} ${MOUTH_Y}" fill="none" stroke="#e8c0cc" stroke-width="1.8" stroke-linecap="round" opacity="${smileOp}"/>`;
    } else {
      // neutral small oval
      html += `<ellipse cx="80" cy="${MOUTH_Y}" rx="${mouthWidth}" ry="1.4" fill="#e8c0cc" opacity="${smileOp}"/>`;
    }
  }

  // ── Tiny sparkles floating around (vgood) ──
  if (vgood) {
    html += `<circle cx="52" cy="60" r="2" fill="rgba(255,240,180,0.7)"/>`;
    html += `<circle cx="108" cy="62" r="1.5" fill="rgba(220,180,255,0.8)"/>`;
    html += `<circle cx="60" cy="108" r="1.5" fill="rgba(255,220,240,0.6)"/>`;
    html += `<circle cx="100" cy="106" r="2" fill="rgba(200,230,255,0.65)"/>`;
  }

  svg.innerHTML = html;
}

// ══════════════════════════════════════════════
//  BACKGROUND / ATMOSPHERE
// ══════════════════════════════════════════════
function updateAtmosphere() {
  const app = document.getElementById('app');
  const glow = document.getElementById('bg-glow');
  const shadow = document.getElementById('shadow-el');
  const t = day / 10;
  const goodness = Math.max(-1, Math.min(1, score / 10));

  if (goodness > 0.3) {
    const g = goodness;
    const r  = Math.round(40 + g * 80);
    const gr = Math.round(20 + g * 60);
    const b  = Math.round(70 + g * 90);
    const r2 = Math.round(20 + g * 50);
    const g2 = Math.round(10 + g * 35);
    const b2 = Math.round(45 + g * 75);
    app.style.background = `radial-gradient(ellipse at 50% 25%, rgba(${r},${gr},${b},1) 0%, rgba(${r2},${g2},${b2},1) 100%)`;
    const glowOp = 0.10 + g * 0.18;
    glow.style.background = `radial-gradient(circle, rgba(210,170,255,${glowOp}) 0%, rgba(255,200,240,${glowOp*0.5}) 40%, transparent 70%)`;
    glow.style.width  = (260 + g * 60) + 'px';
    glow.style.height = (260 + g * 60) + 'px';
    shadow.style.opacity = 0;
  } else if (goodness < -0.3) {
    const c = Math.abs(goodness);
    const r  = Math.round(8  + c * 8);
    const gr = Math.round(4  + c * 3);
    const b  = Math.round(16 + c * 14);
    app.style.background = `radial-gradient(ellipse at 50% 60%, rgba(${r},${gr},${b},1) 0%, rgba(4,2,10,1) 100%)`;
    glow.style.background = `radial-gradient(circle, rgba(70,30,110,${0.06 + c * 0.06}) 0%, transparent 70%)`;
    glow.style.width  = '260px';
    glow.style.height = '260px';
    shadow.style.opacity = Math.min(c * 0.7, 0.6);
  } else {
    const n = t;
    app.style.background = `radial-gradient(ellipse at 50% 40%, rgba(${30+n*6},${22+n*3},${50+n*10},1) 0%, rgba(${14+n*2},12,${28+n*6},1) 100%)`;
    glow.style.background = `radial-gradient(circle, rgba(201,167,232,${0.05+n*0.04}) 0%, transparent 70%)`;
    glow.style.width  = '260px';
    glow.style.height = '260px';
    shadow.style.opacity = 0;
  }
}

// ══════════════════════════════════════════════
//  DOTS
// ══════════════════════════════════════════════
function updateDots() {
  const container = document.getElementById('dots');
  container.innerHTML = '';
  for (let i = 1; i <= 10; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < day ? ' filled' : '');
    container.appendChild(d);
  }
}

// ══════════════════════════════════════════════
//  ANIMATION HELPERS
// ══════════════════════════════════════════════
function setAnim(type) {
  const wrap = document.getElementById('boksuli-wrap');
  wrap.className = '';
  void wrap.offsetWidth;
  if (type === 'bounce') wrap.className = 'anim-bounce';
  else if (type === 'wobble') wrap.className = 'anim-wobble';
  else if (type === 'shake') wrap.className = 'anim-shake';
  else if (type === 'float') wrap.className = 'anim-float';
  else if (type === 'doze') wrap.className = 'anim-doze';
  else if (type === 'glitch') wrap.className = 'anim-glitch';
  else wrap.className = 'anim-breathe';

  if (['bounce','wobble','shake'].includes(type)) {
    setTimeout(() => {
      wrap.className = 'anim-breathe';
    }, 600);
  }
}

function spawnParticles(good) {
  const wrap = document.getElementById('boksuli-wrap');
  const frag = document.createDocumentFragment();
  for (let i = 0; i < 6; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (i / 6) * Math.PI * 2;
    const dist = 40 + Math.random() * 20;
    p.style.cssText = `
      left: 50%; top: 40%;
      background: ${good ? '#f7c6d4' : '#7a5a9a'};
      --tx: translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px);
      animation-delay: ${i * 0.05}s;
    `;
    frag.appendChild(p);
  }
  const container = document.createElement('div');
  container.className = 'particles';
  container.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;';
  container.appendChild(frag);
  wrap.appendChild(container);
  setTimeout(() => container.remove(), 1500);
}

function spawnFloat(text) {
  const wrap = document.getElementById('boksuli-wrap');
  const el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = text;
  el.style.left = (40 + Math.random() * 20) + '%';
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 1500);
}

// ══════════════════════════════════════════════
//  RENDER DAY
// ══════════════════════════════════════════════
function renderDay() {
  const ev = events[day - 1];
  document.getElementById('day-num').textContent = day;
  updateDots();
  drawBoksuli(score);
  updateAtmosphere();

  // Event text
  const et = document.getElementById('event-text');
  et.style.opacity = 0;
  et.textContent = ev.text;
  et.className = 'event-text';
  setTimeout(() => { et.style.opacity = 1; }, 100);

  // Choices
  const ch = document.getElementById('choices');
  ch.innerHTML = '';
  ev.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn fade-in';
    btn.style.animationDelay = (i * 0.1) + 's';
    btn.textContent = c.text;
    btn.onclick = () => onChoice(c, btn);
    ch.appendChild(btn);
  });
}

// ══════════════════════════════════════════════
//  ON CHOICE
// ══════════════════════════════════════════════
function onChoice(choice, btn) {
  // Disable all buttons
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);

  score += choice.delta;

  // Animate boksuli
  setAnim(choice.anim);
  spawnParticles(choice.delta >= 0);
  if (choice.delta >= 1) spawnFloat('✦');
  else if (choice.delta <= -2) spawnFloat('...');

  // Show reaction
  const et = document.getElementById('event-text');
  et.style.opacity = 0;
  setTimeout(() => {
    et.innerHTML = `<span class="reaction-text">${choice.reaction}</span>`;
    et.style.opacity = 1;
  }, 300);

  // Advance day
  setTimeout(() => {
    day++;
    if (day > 10) {
      showEnding();
    } else {
      renderDay();
    }
  }, 1800);
}

// ══════════════════════════════════════════════
//  START / REPLAY
// ══════════════════════════════════════════════
function startGame() {
  day = 1; score = 0;
  document.getElementById('title-screen').style.display = 'none';
  const gs = document.getElementById('game-screen');
  gs.style.display = 'flex';
  renderDay();
}

function replayGame() {
  day = 1; score = 0;
  document.getElementById('ending-screen').style.display = 'none';
  document.getElementById('ending-screen').style.opacity = '';

  const app = document.getElementById('app');
  app.style.background = '';

  // Reset CSS vars
  document.getElementById('shadow-el').style.opacity = 0;

  const gs = document.getElementById('game-screen');
  gs.style.display = 'flex';
  renderDay();
}
